<!DOCTYPE html>
<html>
<head>

<title>Emitte</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1f3c88,#4a69bd);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
width:320px;
text-align:center;
}

.logo{
width:160px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#1f3c88;
color:white;
border:none;
border-radius:5px;
}

</style>

</head>

<body>

<div class="login-box">

<img src="/static/logo.png" class="logo">

<form method="POST">

<input name="usuario" placeholder="Usuário" required>

<input name="senha" type="password" placeholder="Senha" required>

<button type="submit">Entrar</button>

</form>

</div>

</body>
</html>
