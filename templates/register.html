<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Criar Conta - Emitte</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-10 rounded-xl shadow-lg w-96">

        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-blue-900">Criar Conta</h2>
        </div>

        <form method="POST" action="/register">

            <div class="mb-4">
                <input name="email" placeholder="Email"
                class="w-full border rounded-lg p-3">
            </div>

            <div class="mb-6">
                <input name="password" type="password" placeholder="Senha"
                class="w-full border rounded-lg p-3">
            </div>

            <button type="submit"
            class="w-full bg-blue-900 text-white py-3 rounded-lg hover:bg-blue-800 transition">
                Criar Conta
            </button>

        </form>

        <div class="text-center mt-6">
            <a href="/login" class="text-blue-900 font-semibold">
                Voltar para Login
            </a>
        </div>

    </div>

</body>
</html>
