<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Emitte</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<nav class="bg-white shadow-md">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <img src="{{ url_for('static', filename='logo.png') }}" class="h-10">
            <h1 class="text-2xl font-bold text-blue-900">Emitte</h1>
        </div>
        <a href="/logout" class="text-red-500 font-semibold">Sair</a>
    </div>
</nav>

<div class="max-w-6xl mx-auto mt-10 px-6">

    <div class="bg-white p-8 rounded-xl shadow">

        <h2 class="text-2xl font-bold text-blue-900 mb-6">
            Bem-vindo ao painel Emitte
        </h2>

        <p class="text-gray-600 mb-8">
            Plataforma de emissão inteligente de certificados e declarações.
        </p>

        <div class="grid grid-cols-3 gap-6">

            <div class="bg-gray-50 p-6 rounded-lg shadow">
                <h3 class="text-gray-500 text-sm">Certificados Gerados</h3>
                <p class="text-3xl font-bold text-blue-900 mt-2">0</p>
            </div>

            <div class="bg-gray-50 p-6 rounded-lg shadow">
                <h3 class="text-gray-500 text-sm">Status</h3>
                <p class="text-green-600 font-semibold mt-2">Online</p>
            </div>

            <div class="bg-gray-50 p-6 rounded-lg shadow">
                <h3 class="text-gray-500 text-sm">Plano</h3>
                <p class="text-blue-900 font-semibold mt-2">Interno</p>
            </div>

        </div>

    </div>

</div>

</body>
</html>
