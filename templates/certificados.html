<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerar Certificados - Emitte</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-10">

<div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow">

    <h2 class="text-2xl font-bold text-blue-900 mb-6">
        Gerar Certificados
    </h2>

    <form method="POST" enctype="multipart/form-data" class="space-y-6">

        <div>
            <label class="block font-semibold mb-2">
                Imagem de Fundo (PNG ou JPG)
            </label>
            <input type="file" name="fundo" required
            class="w-full border p-3 rounded-lg">
        </div>

        <div>
            <label class="block font-semibold mb-2">
                Planilha Excel (.xlsx)
            </label>
            <input type="file" name="planilha" required
            class="w-full border p-3 rounded-lg">
        </div>

        <div>
            <label class="block font-semibold mb-2">
                Texto do Certificado
            </label>
            <textarea name="texto"
            class="w-full border p-4 rounded-lg"
            rows="4"
            placeholder='CERTIFICAMOS QUE {nome} PARTICIPOU DO EVENTO...'></textarea>
        </div>

        <button type="submit"
        class="w-full bg-blue-900 text-white py-4 rounded-lg hover:bg-blue-800 transition">
            Gerar Certificados
        </button>

    </form>

</div>

</body>
</html>
