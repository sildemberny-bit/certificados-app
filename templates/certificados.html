<!DOCTYPE html>
<html>

<head>

<title>Gerar Certificados</title>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
}

.menu{
width:40%;
padding:30px;
overflow:auto;
}

.preview{
width:60%;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
}

iframe{
width:90%;
height:90%;
border:none;
}

input,select,textarea{
width:100%;
margin-bottom:10px;
padding:8px;
}

button{
padding:10px;
margin-top:5px;
}

.topo{
position:fixed;
right:20px;
top:20px;
}

</style>

</head>

<body>

<div class="topo">
<a href="/logout">SAIR</a>
</div>

<div class="menu">

<form id="form" method="POST" enctype="multipart/form-data">

<label>Planilha Excel</label>
<input type="file" name="planilha">

<label>Fundo JPG</label>
<input type="file" name="fundo" id="fundo">

<label>Texto</label>
<textarea name="texto" rows="8"></textarea>

<label>Tamanho da fonte</label>
<select name="fonte">
<option>10</option>
<option>12</option>
<option>14</option>
<option>16</option>
<option>18</option>
<option>20</option>
</select>

<label>Alinhamento</label>
<select name="alinhamento">
<option value="esquerda">Esquerda</option>
<option value="centro">Centro</option>
<option value="direita">Direita</option>
</select>

<label>Posição</label>
<select name="posicao">
<option value="acima">Acima</option>
<option value="centro">Centro</option>
<option value="abaixo">Abaixo</option>
</select>

<label>Município</label>
<input name="municipio">

<label>Dia</label>
<input name="dia">

<label>Mês</label>
<input name="mes">

<label>Ano</label>
<input name="ano">

<button type="button" onclick="preview()">Atualizar Preview</button>

<button type="submit">Gerar Certificados</button>

</form>

</div>

<div class="preview">

<iframe id="previewFrame"></iframe>

</div>

<script>

function preview(){

let form=document.getElementById("form")

let data=new FormData(form)

fetch("/preview",{method:"POST",body:data})
.then(r=>r.blob())
.then(blob=>{

let url=URL.createObjectURL(blob)

document.getElementById("previewFrame").src=url

})

}

</script>

</body>
</html>
