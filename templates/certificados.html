<!DOCTYPE html>
<html>
<head>

<title>Gerar Certificados</title>

<style>

body{
font-family:Arial;
margin:0;
}

header{
background:#1f3c88;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

.container{
display:flex;
height:90vh;
}

.form{
width:400px;
padding:20px;
}

.preview{
flex:1;
display:flex;
align-items:center;
justify-content:center;
background:#eee;
}

.preview img{
max-width:90%;
max-height:90%;
}

input,select,textarea{
width:100%;
margin-bottom:10px;
padding:8px;
}

button{
padding:12px;
width:100%;
background:#1f3c88;
color:white;
border:none;
}

</style>

</head>

<body>

<header>

<div>Emitte</div>

<a href="/logout" style="color:white">Sair</a>

</header>

<div class="container">

<div class="form">

<form method="POST" action="/gerar" enctype="multipart/form-data" id="form">

<input type="file" name="planilha">

<input type="file" name="fundo" id="fundo">

<textarea name="texto" id="texto" rows="5"></textarea>

<select name="fonte" id="fonte">
<option>10</option>
<option>12</option>
<option>14</option>
<option>16</option>
<option>18</option>
<option>20</option>
</select>

<select name="alinhamento" id="alinhamento">
<option value="centro">Centro</option>
<option value="esquerda">Esquerda</option>
<option value="direita">Direita</option>
</select>

<button type="submit">Gerar Certificados</button>

</form>

</div>

<div class="preview">

<img id="preview">

</div>

</div>

<script>

function atualizarPreview(){

const fundo = document.getElementById("fundo").files[0]

if(!fundo) return

const data = new FormData()

data.append("fundo",fundo)
data.append("texto",document.getElementById("texto").value)
data.append("fonte",document.getElementById("fonte").value)
data.append("alinhamento",document.getElementById("alinhamento").value)

fetch("/preview",{method:"POST",body:data})
.then(r=>r.blob())
.then(img=>{

document.getElementById("preview").src = URL.createObjectURL(img)

})

}

document.querySelectorAll("input,textarea,select").forEach(e=>{

e.addEventListener("change",atualizarPreview)
e.addEventListener("keyup",atualizarPreview)

})

</script>

</body>
</html>
