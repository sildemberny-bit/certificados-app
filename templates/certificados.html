<!DOCTYPE html>
<html>

<head>

<title>Gerar Certificados</title>

<style>

body{
font-family:Arial;
margin:0;
}

.container{
display:flex;
height:100vh;
}

.form{
width:400px;
padding:30px;
background:#f4f6f9;
}

.preview{
flex:1;
display:flex;
align-items:center;
justify-content:center;
background:#ddd;
}

input,textarea,select{
width:100%;
margin-bottom:10px;
padding:8px;
}

button{
padding:10px;
width:100%;
background:#1f3c88;
color:white;
border:none;
}

</style>

</head>

<body>

<div class="container">

<div class="form">

<form method="POST" action="/gerar" enctype="multipart/form-data">

<label>Excel</label>
<input type="file" name="planilha">

<label>Fundo</label>
<input type="file" name="fundo">

<label>Texto</label>
<textarea name="texto"></textarea>

<label>Fonte</label>
<select name="fonte">
<option>10</option>
<option>12</option>
<option>14</option>
<option>16</option>
<option>18</option>
<option>20</option>
</select>

<label>Alinhamento</label>
<select name="alinhamento">
<option value="esquerda">Esquerda</option>
<option value="centro">Centro</option>
<option value="direita">Direita</option>
</select>

<button>Gerar Certificados</button>

</form>

</div>

<div class="preview">

<img id="preview">

</div>

</div>

</body>

</html>
