<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerar Certificados - Emitte</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-10">

<div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow">

    <h2 class="text-2xl font-bold text-blue-900 mb-6">
        Gerar Certificados
    </h2>

    <form method="POST" enctype="multipart/form-data" class="space-y-6">

        <input type="file" name="fundo" required class="w-full border p-3 rounded-lg">
        <input type="file" name="planilha" required class="w-full border p-3 rounded-lg">

        <textarea name="texto" rows="4"
        class="w-full border p-4 rounded-lg"
        placeholder='CERTIFICAMOS QUE {NOME} PARTICIPOU...'></textarea>

        <div>
            <label class="block font-semibold mb-2">Tamanho da Fonte (10 a 20)</label>
            <input type="number" name="fonte" min="10" max="20" value="18"
            class="w-full border p-3 rounded-lg">
        </div>

        <div>
            <label class="block font-semibold mb-2">Alinhamento</label>
            <select name="alinhamento" class="w-full border p-3 rounded-lg">
                <option value="centro">Centro</option>
                <option value="esquerda">Esquerda</option>
                <option value="direita">Direita</option>
            </select>
        </div>

        <div>
            <label class="block font-semibold mb-2">Posição Vertical</label>
            <select name="posicao_vertical" class="w-full border p-3 rounded-lg">
                <option value="centro">Centro</option>
                <option value="superior">Superior</option>
                <option value="inferior">Inferior</option>
            </select>
        </div>

        <button type="submit"
        class="w-full bg-blue-900 text-white py-4 rounded-lg hover:bg-blue-800 transition">
            Gerar Certificados
        </button>

    </form>

</div>

</body>
</html>
