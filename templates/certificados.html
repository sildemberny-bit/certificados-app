<!DOCTYPE html>
<html>
<head>
    <title>Gerar Certificados</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-10">

<h2 class="text-2xl font-bold mb-6">Gerar Certificados</h2>

<form method="POST" enctype="multipart/form-data" class="space-y-6 bg-white p-8 rounded shadow">

    <div>
        <label>Imagem de Fundo:</label>
        <input type="file" name="fundo" required>
    </div>

    <div>
        <label>Planilha Excel (.xlsx):</label>
        <input type="file" name="planilha" required>
    </div>

    <div>
        <label>Texto do Certificado:</label>
        <textarea name="texto" class="w-full border p-3 rounded"
        placeholder='CERTIFICAMOS QUE {nome} PARTICIPOU DO EVENTO...'></textarea>
    </div>

    <button class="bg-blue-900 text-white px-6 py-3 rounded">
        Gerar Certificados
    </button>

</form>

</body>
</html>
