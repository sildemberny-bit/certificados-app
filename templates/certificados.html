<!DOCTYPE html>
<html>
<head>

<title>Emitte - Gerador</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

header{
background:#1f3c88;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
}

.container{
display:flex;
gap:40px;
padding:40px;
}

.form-box{
width:35%;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0px 4px 15px rgba(0,0,0,0.1);
}

.preview-box{
width:65%;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 4px 15px rgba(0,0,0,0.1);
}

iframe{
width:100%;
height:600px;
border:none;
}

input,select,textarea{
width:100%;
padding:10px;
margin:8px 0 15px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#1f3c88;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h2>Emitte - Gerador de Certificados</h2>

<a href="/logout" style="color:white;">Sair</a>

</header>

<div class="container">

<div class="form-box">

<form id="form-certificado" method="POST" enctype="multipart/form-data">

<label>Imagem de Fundo</label>
<input type="file" name="fundo" id="fundo" accept=".jpg,.jpeg" required>

<label>Planilha Excel</label>
<input type="file" name="planilha" accept=".xlsx" required>

<label>Texto do Certificado</label>
<textarea name="texto" id="texto" rows="5" required></textarea>

<label>Tamanho da Fonte</label>
<select name="fonte" id="fonte">
<option value="10">10</option>
<option value="12">12</option>
<option value="14">14</option>
<option value="16">16</option>
<option value="18">18</option>
<option value="20">20</option>
</select>

<label>Alinhamento</label>
<select name="alinhamento" id="alinhamento">
<option value="centro">Centro</option>
<option value="esquerda">Esquerda</option>
<option value="direita">Direita</option>
</select>

<label>Posição Vertical</label>
<select name="posicao_vertical" id="posicao_vertical">
<option value="superior">Superior</option>
<option value="centro">Centro</option>
<option value="inferior">Inferior</option>
</select>

<button type="button" onclick="gerarPreview()">
Atualizar Preview
</button>

<br><br>

<button type="submit">
Gerar Certificados
</button>

</form>

</div>

<div class="preview-box">

<h3>Preview</h3>

<iframe id="preview-frame"></iframe>

</div>

</div>

<script>

function gerarPreview(){

let fundo = document.getElementById("fundo").files[0]

if(!fundo){
alert("Selecione a imagem de fundo primeiro")
return
}

let data = new FormData()

data.append("fundo", fundo)
data.append("texto",document.getElementById("texto").value)
data.append("fonte",document.getElementById("fonte").value)
data.append("alinhamento",document.getElementById("alinhamento").value)
data.append("posicao_vertical",document.getElementById("posicao_vertical").value)

fetch("/preview",{
method:"POST",
body:data
})
.then(res => res.blob())
.then(blob => {

let url = URL.createObjectURL(blob)

document.getElementById("preview-frame").src = url

})

}

</script>

</body>
</html>
