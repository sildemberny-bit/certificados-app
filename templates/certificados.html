<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Gerar Certificados</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f4f6f8;
margin:0;
padding:0;
}

.logo{
text-align:center;
margin-top:30px;
}

.logo img{
height:60px;
}

.wrapper{
display:flex;
gap:40px;
max-width:1200px;
margin:auto;
margin-top:40px;
align-items:flex-start;
}

.form-box{
flex:1;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.preview-box{
flex:1;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

h1{
margin-top:0;
}

label{
font-weight:bold;
display:block;
margin-top:15px;
}

input, select, textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
box-sizing:border-box;
}

textarea{
height:150px;
resize:vertical;
}

button{
margin-top:25px;
padding:15px;
width:100%;
border:none;
border-radius:8px;
background:#28a745;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#218838;
}

.preview-box img{
max-width:100%;
border-radius:6px;
border:1px solid #ddd;
}

</style>

</head>

<body>

<div class="logo">
<img src="/static/logo.png">
</div>

<div class="wrapper">

<div class="form-box">

<h1>Gerar Certificados</h1>

<form action="/certificados" method="post" enctype="multipart/form-data">

<label>Imagem do certificado</label>
<input type="file" name="fundo" id="fundo" required>

<label>Planilha Excel (.xlsx)</label>
<input type="file" name="planilha" required>

<label>Texto do certificado</label>
<textarea name="texto" required></textarea>

<label>Tamanho da fonte</label>
<input type="number" name="fonte" value="18">

<label>Alinhamento</label>
<select name="alinhamento">

<option value="centro">Centro</option>
<option value="esquerda">Esquerda</option>
<option value="direita">Direita</option>

</select>

<label>Posição vertical</label>
<select name="posicao_vertical">

<option value="superior">Superior</option>
<option value="centro">Centro</option>
<option value="inferior">Inferior</option>

</select>

<label>Ajuste fino vertical (px)</label>
<input type="number" name="ajuste_vertical" value="0">

<label>Largura do bloco de texto (%)</label>
<input type="number" name="largura_texto" value="70">

<button type="submit">
Gerar certificados
</button>

</form>

</div>

<div class="preview-box">

<h2>Preview</h2>

<img id="previewImg">

</div>

</div>

<script>

document.getElementById("fundo").addEventListener("change", function(e){

const file = e.target.files[0]

if(!file) return

const reader = new FileReader()

reader.onload = function(event){

document.getElementById("previewImg").src = event.target.result

}

reader.readAsDataURL(file)

})

</script>

</body>
</html>
