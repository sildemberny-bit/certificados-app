<!DOCTYPE html>
<html>
<head>

<title>Emitte - Certificados</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

header{
background:#1f3c88;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
display:flex;
height:calc(100vh - 70px);
}

.form-area{
width:420px;
background:white;
padding:30px;
overflow:auto;
}

.preview-area{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:#e9edf4;
}

.preview-area img{
max-width:90%;
max-height:90%;
box-shadow:0 4px 20px rgba(0,0,0,0.2);
}

input,select,textarea{
width:100%;
margin-bottom:12px;
padding:8px;
}

button{
padding:12px;
width:100%;
background:#1f3c88;
color:white;
border:none;
border-radius:6px;
}

.logout{
background:#999;
padding:8px 14px;
border-radius:4px;
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<header>

<img src="/static/logo.png" height="40">

<a class="logout" href="/logout">Sair</a>

</header>

<div class="container">

<div class="form-area">

<form id="certForm" method="POST" action="/gerar" enctype="multipart/form-data">

<label>Planilha Excel</label>
<input type="file" name="planilha">

<label>Imagem Fundo</label>
<input type="file" name="fundo" id="fundo">

<label>Texto</label>
<textarea name="texto" id="texto" rows="6"></textarea>

<label>Tamanho da fonte</label>
<select name="fonte" id="fonte">
<option>10</option>
<option>12</option>
<option>14</option>
<option>16</option>
<option>18</option>
<option>20</option>
</select>

<label>Alinhamento</label>
<select name="alinhamento" id="alinhamento">
<option value="centro">Centro</option>
<option value="esquerda">Esquerda</option>
<option value="direita">Direita</option>
</select>

<label>Posição Vertical</label>
<select name="posicao" id="posicao">
<option value="acima">Acima</option>
<option value="centro">Centro</option>
<option value="abaixo">Abaixo</option>
</select>

<button type="submit">Gerar Certificados</button>

</form>

</div>

<div class="preview-area">

<img id="preview">

</div>

</div>

<script>

const form = document.getElementById("certForm")

const campos = document.querySelectorAll("input, textarea, select")

campos.forEach(c => {

c.addEventListener("change", atualizarPreview)
c.addEventListener("keyup", atualizarPreview)

})

function atualizarPreview(){

const fundo = document.getElementById("fundo").files[0]

if(!fundo) return

const data = new FormData()

data.append("fundo", fundo)
data.append("texto", document.getElementById("texto").value)
data.append("fonte", document.getElementById("fonte").value)
data.append("alinhamento", document.getElementById("alinhamento").value)
data.append("posicao", document.getElementById("posicao").value)

fetch("/preview",{
method:"POST",
body:data
})
.then(res=>res.blob())
.then(blob=>{

document.getElementById("preview").src =
URL.createObjectURL(blob)

})

}

</script>

</body>
</html>
