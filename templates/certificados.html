<h2>Gerador de Certificados</h2>

<form method="POST" enctype="multipart/form-data">

<p>Planilha Excel:</p>
<input type="file" name="excel" required>

<br><br>

<p>Imagem de fundo do certificado (JPG ou PNG):</p>
<input type="file" name="fundo" required>

<br><br>

<p>Texto do certificado:</p>
<textarea name="texto" rows="4" cols="80" required>
Certificamos que {NOME} participou do curso {CURSO} com carga horária de {CARGA} horas.
</textarea>

<br><br>

<button type="submit">Gerar certificados</button>

</form>

<br>

<a href="/logout">Sair</a>
