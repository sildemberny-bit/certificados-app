<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Certificados Gerados</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-10">

<div class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow">

<h1 class="text-2xl font-bold mb-6">Certificados Gerados</h1>

<ul class="space-y-4">
{% for file in files %}
<li class="flex justify-between border p-4 rounded">
<span>{{ file }}</span>
<a href="/download/{{ file }}"
class="bg-blue-600 text-white px-4 py-2 rounded">
Baixar
</a>
</li>
{% endfor %}
</ul>

</div>

</body>
</html>
