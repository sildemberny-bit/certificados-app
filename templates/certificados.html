<!DOCTYPE html>
<html>
<head>

<title>Emitte - Gerar Certificados</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

header{
background:#1f3c88;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

header img{
height:40px;
}

.container{
display:flex;
height:calc(100vh - 70px);
}

.form-area{
width:420px;
background:white;
padding:30px;
overflow:auto;
box-shadow:2px 0px 10px rgba(0,0,0,0.05);
}

.preview-area{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:#e9edf4;
}

.preview-area img{
max-width:95%;
max-height:90%;
box-shadow:0 4px 20px rgba(0,0,0,0.2);
border-radius:4px;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input, select, textarea{
width:100%;
padding:8px;
margin-top:5px;
border-radius:4px;
border:1px solid #ccc;
}

textarea{
height:120px;
}

button{
margin-top:20px;
padding:12px;
width:100%;
background:#1f3c88;
color:white;
border:none;
border-radius:6px;
font-size:15px;
cursor:pointer;
}

.logout{
background:#999;
padding:8px 14px;
border-radius:4px;
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<header>

<img src="/static/logo.png">

<a class="logout" href="/logout">Sair</a>

</header>


<div class="container">


<div class="form-area">

<form id="certForm" method="POST" enctype="multipart/form-data">

<label>Planilha Excel</label>
<input type="file" name="planilha">

<label>Imagem de Fundo</label>
<input type="file" name="fundo" id="fundoInput" required>

<label>Texto do Certificado</label>
<textarea name="texto" id="textoInput"></textarea>


<label>Tamanho da Fonte</label>
<select name="fonte" id="fonteInput">
<option>10</option>
<option>12</option>
<option>14</option>
<option>16</option>
<option>18</option>
<option>20</option>
</select>


<label>Alinhamento</label>
<select name="alinhamento" id="alinhamentoInput">
<option value="centro">Centro</option>
<option value="esquerda">Esquerda</option>
<option value="direita">Direita</option>
</select>


<label>Posição Vertical</label>
<select name="posicao" id="posicaoInput">
<option value="acima">Acima</option>
<option value="centro">Centro</option>
<option value="abaixo">Abaixo</option>
</select>


<label>Município</label>
<input type="text" name="municipio" id="municipioInput">

<label>Dia</label>
<input type="text" name="dia" id="diaInput">

<label>Mês</label>
<input type="text" name="mes" id="mesInput">

<label>Ano</label>
<input type="text" name="ano" id="anoInput">


<button type="submit">
Gerar Certificados
</button>

</form>

</div>



<div class="preview-area">

<img id="previewImage">

</div>


</div>


<script>

const form = document.getElementById("certForm")
const previewImage = document.getElementById("previewImage")

const inputs = document.querySelectorAll("#certForm input, #certForm select, #certForm textarea")

inputs.forEach(input => {

input.addEventListener("change", atualizarPreview)
input.addEventListener("keyup", atualizarPreview)

})


function atualizarPreview(){

const fundo = document.getElementById("fundoInput").files[0]

if(!fundo) return

const formData = new FormData(form)

fetch("/preview",{
method:"POST",
body:formData
})
.then(res => res.blob())
.then(blob => {

const url = URL.createObjectURL(blob)

previewImage.src = url

})

}

</script>


</body>
</html>
