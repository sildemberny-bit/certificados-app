<!DOCTYPE html>
<html>
<head>

<title>Emitte</title>

<style>

body{
font-family:Arial;
margin:40px;
}

.logo{
width:160px;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
}

button{
padding:12px 20px;
background:#1f3c88;
color:white;
border:none;
margin-top:10px;
}

</style>

</head>

<body>

<img src="/static/logo.png" class="logo">

<h2>Gerador de Certificados</h2>

<form method="POST" action="/preview" enctype="multipart/form-data" target="_blank">

<label>Fundo do certificado</label>
<input type="file" name="fundo" required>

<label>Texto do certificado</label>

<textarea name="texto" rows="4">
Certificamos que {NOME} participou do curso {CURSO} com carga horária de {CARGA} horas.
</textarea>

<h3>Data</h3>

<input name="municipio" placeholder="Município">

<input name="dia" placeholder="Dia">

<input name="mes" placeholder="Mês por extenso">

<input name="ano" placeholder="Ano">

<button type="submit">Preview</button>

</form>

<hr>

<form method="POST" enctype="multipart/form-data">

<label>Planilha Excel</label>
<input type="file" name="planilha" required>

<label>Fundo do certificado</label>
<input type="file" name="fundo" required>

<label>Texto do certificado</label>

<textarea name="texto" rows="4">
Certificamos que {NOME} participou do curso {CURSO} com carga horária de {CARGA} horas.
</textarea>

<h3>Data</h3>

<input name="municipio">

<input name="dia">

<input name="mes">

<input name="ano">

<button type="submit">Gerar certificados</button>

</form>

</body>
</html>
