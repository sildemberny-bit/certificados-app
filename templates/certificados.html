<!DOCTYPE html>
<html>
<head>
    <title>Emitte - Gerador</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f6f9;
        }

        .container {
            width: 90%;
            margin: auto;
        }

        .preview-box {
            position: relative;
            width: 100%;
            max-width: 1000px;
            margin: 20px auto;
            border: 2px solid #ccc;
            background-color: white;
        }

        #preview-img {
            width: 100%;
            display: none;
        }

        #preview-text {
            position: absolute;
            width: 80%;
            left: 10%;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            text-align: center;
            white-space: pre-wrap;
        }

        input, select, textarea {
            margin: 8px;
            padding: 8px;
            width: 300px;
        }

        button {
            padding: 10px 20px;
            background-color: #1f3c88;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #162d66;
        }
    </style>
</head>
<body>

<h2>Emitte - Gerador de Certificados</h2>

<a href="/logout">Sair</a>

<div class="container">

<form method="POST" enctype="multipart/form-data">

    <div>
        <input type="file" name="fundo" id="fundo" accept="image/*" required>
    </div>

    <div>
        <input type="file" name="planilha" accept=".xlsx" required>
    </div>

    <div>
        <textarea name="texto" id="texto" rows="4" placeholder="Digite o texto do certificado com {NOME}, {CURSO}, etc." required></textarea>
    </div>

    <div>
        <label>Tamanho da Fonte:</label><br>
        <select name="fonte">
            {% for i in range(10,21) %}
            <option value="{{i}}">{{i}}</option>
            {% endfor %}
        </select>
    </div>

    <div>
        <label>Alinhamento:</label><br>
        <select name="alinhamento">
            <option value="centro">Centro</option>
            <option value="esquerda">Esquerda</option>
            <option value="direita">Direita</option>
        </select>
    </div>

    <div>
        <label>Posição Vertical:</label><br>
        <select name="posicao_vertical">
            <option value="superior">Superior</option>
            <option value="centro" selected>Centro</option>
            <option value="inferior">Inferior</option>
        </select>
    </div>

    <br>
    <button type="submit">Gerar Certificados</button>

</form>

<div class="preview-box">
    <img id="preview-img">
    <div id="preview-text"></div>
</div>

</div>

<script>
    const fundoInput = document.getElementById("fundo");
    const previewImg = document.getElementById("preview-img");
    const textoInput = document.getElementById("texto");
    const previewText = document.getElementById("preview-text");

    fundoInput.addEventListener("change", function(event) {
        const file = event.target.files[0];
        if (file) {
            previewImg.src = URL.createObjectURL(file);
            previewImg.style.display = "block";
        }
    });

    textoInput.addEventListener("input", function() {
        previewText.textContent = textoInput.value;
    });
</script>

</body>
</html>
