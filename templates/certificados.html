<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>Gerar Certificados</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:40px;
}

.container{
display:flex;
gap:40px;
}

.form{
width:40%;
}

.preview{
width:60%;
text-align:center;
}

img{
max-width:100%;
border-radius:10px;
}

footer{
margin-top:60px;
text-align:center;
color:#777;
}

</style>

<script>

function previewImagem(event){

const reader = new FileReader()

reader.onload = function(){

document.getElementById("previewImg").src = reader.result

}

reader.readAsDataURL(event.target.files[0])

}

</script>

</head>

<body>

<h2>Gerar Certificados</h2>

<div class="container">

<div class="form">

<form action="/gerar" method="POST" enctype="multipart/form-data">

<label>Imagem do certificado</label><br>
<input type="file" name="fundo" accept=".jpg,.jpeg,.png" onchange="previewImagem(event)" required><br><br>

<label>Planilha Excel</label><br>
<input type="file" name="planilha" accept=".xlsx" required><br><br>

<label>Texto</label><br>
<textarea name="texto" rows="6" style="width:100%" required></textarea><br><br>

<label>Tamanho da fonte</label><br>
<input type="number" name="fonte" value="14"><br><br>

<label>Ajuste vertical</label><br>
<input type="number" name="posicao" value="0"><br><br>

<button type="submit">Gerar certificados</button>

</form>

</div>

<div class="preview">

<img id="previewImg">

</div>

</div>

<footer>

Versão 1.1<br>
Desenvolvido por S3M

</footer>

</body>

</html>
