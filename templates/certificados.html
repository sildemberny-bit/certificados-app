<!DOCTYPE html>
<html>

<head>

<title>Gerar Certificados</title>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
background:#f4f6fb;
}

.sidebar{
width:35%;
padding:30px;
overflow:auto;
background:white;
box-shadow:2px 0 8px rgba(0,0,0,0.05);
}

.preview{
width:65%;
display:flex;
justify-content:center;
align-items:center;
}

.preview img{
max-width:95%;
max-height:95%;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

input,select,textarea{
width:100%;
padding:10px;
margin-bottom:12px;
border-radius:6px;
border:1px solid #ccc;
}

textarea{
resize:vertical;
}

button{
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.gerar{
background:#1f3c88;
color:white;
width:100%;
}

.previewBtn{
background:#4a69bd;
color:white;
width:100%;
margin-bottom:10px;
}

.logout{
position:absolute;
top:20px;
right:20px;
background:#e74c3c;
color:white;
padding:10px 16px;
border-radius:6px;
text-decoration:none;
font-size:14px;
}

.logo{
width:130px;
margin-bottom:20px;
}

</style>

</head>

<body>

<a href="/logout" class="logout">Sair</a>

<div class="sidebar">

<img src="/static/logo.png" class="logo">

<form id="form" method="POST" enctype="multipart/form-data">

<label>Planilha Excel</label>
<input type="file" name="planilha">

<label>Fundo do certificado</label>
<input type="file" name="fundo" id="fundo">

<label>Texto do certificado</label>
<textarea name="texto" rows="7"></textarea>

<label>Tamanho da fonte</label>
<select name="fonte">
<option>10</option>
<option>12</option>
<option>14</option>
<option>16</option>
<option>18</option>
<option>20</option>
</select>

<label>Alinhamento</label>
<select name="alinhamento">
<option value="esquerda">Esquerda</option>
<option value="centro">Centro</option>
<option value="direita">Direita</option>
</select>

<label>Posição vertical</label>
<select name="posicao">
<option value="acima">Acima</option>
<option value="centro">Centro</option>
<option value="abaixo">Abaixo</option>
</select>

<label>Município</label>
<input name="municipio">

<label>Dia</label>
<input name="dia">

<label>Mês</label>
<input name="mes">

<label>Ano</label>
<input name="ano">

<button type="button" class="previewBtn" onclick="preview()">Atualizar Preview</button>

<button type="submit" class="gerar">Gerar Certificados</button>

</form>

</div>

<div class="preview">

<img id="previewImg">

</div>

<script>

function preview(){

let form=document.getElementById("form")

let data=new FormData(form)

fetch("/preview",{method:"POST",body:data})
.then(r=>r.blob())
.then(blob=>{

let url=URL.createObjectURL(blob)

document.getElementById("previewImg").src=url

})

}

document.querySelectorAll("input, textarea, select").forEach(el=>{
el.addEventListener("change", preview)
})

</script>

</body>
</html>
