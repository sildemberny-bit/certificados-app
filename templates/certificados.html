<!DOCTYPE html>
<html>

<head>
<title>Emitte - Gerar Certificados</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

header{
background:#1f3c88;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

header a{
background:white;
color:#1f3c88;
padding:8px 14px;
text-decoration:none;
border-radius:4px;
font-weight:bold;
}

.container{
display:flex;
height:calc(100vh - 70px);
}

.form-area{
width:40%;
background:white;
padding:30px;
overflow:auto;
box-shadow:2px 0px 10px rgba(0,0,0,0.1);
}

.preview-area{
width:60%;
display:flex;
justify-content:center;
align-items:center;
background:#e9ecf2;
}

.preview-box{
width:90%;
height:85%;
background:white;
display:flex;
justify-content:center;
align-items:center;
border-radius:8px;
box-shadow:0px 4px 20px rgba(0,0,0,0.15);
overflow:hidden;
}

.preview-box img{
max-width:100%;
max-height:100%;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:4px;
}

textarea{
height:140px;
resize:vertical;
}

button{
margin-top:20px;
width:100%;
padding:12px;
background:#1f3c88;
color:white;
border:none;
border-radius:4px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#162c63;
}

.logo{
font-weight:bold;
font-size:18px;
}

</style>
</head>

<body>

<header>

<div class="logo">EMITTE</div>

<a href="/logout">SAIR</a>

</header>

<div class="container">

<div class="form-area">

<form method="POST" enctype="multipart/form-data">

<label>Planilha Excel</label>
<input type="file" name="planilha" id="planilha" required>

<label>Imagem de fundo</label>
<input type="file" name="fundo" id="fundo" accept="image/*" required>

<label>Texto do certificado</label>
<textarea name="texto" id="texto" placeholder="Ex: Certificamos que {NOME} participou do curso {CURSO}..." required></textarea>

<label>Tamanho da fonte</label>
<select name="fonte" id="fonte">

<option>10</option>
<option>11</option>
<option selected>12</option>
<option>13</option>
<option>14</option>
<option>15</option>
<option>16</option>
<option>17</option>
<option>18</option>
<option>19</option>
<option>20</option>

</select>

<label>Alinhamento</label>
<select name="alinhamento" id="alinhamento">

<option value="centro">Centro</option>
<option value="esquerda">Esquerda</option>
<option value="direita">Direita</option>
<option value="justificado">Justificado</option>

</select>

<label>Posição vertical</label>
<select name="posicao_vertical" id="posicao_vertical">

<option value="superior">Mais acima</option>
<option value="centro" selected>Centro</option>
<option value="inferior">Mais abaixo</option>

</select>

<button type="submit">Gerar Certificados</button>

</form>

</div>

<div class="preview-area">

<div class="preview-box">

<img id="previewImagem" src="">

</div>

</div>

</div>

<script>

const fundoInput = document.getElementById("fundo")
const preview = document.getElementById("previewImagem")

fundoInput.addEventListener("change", function(){

const file = this.files[0]

if(file){

const reader = new FileReader()

reader.onload = function(e){

preview.src = e.target.result

}

reader.readAsDataURL(file)

}

})

</script>

</body>
</html>
