<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gerador de Certificados</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-10">

<div class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow-xl">
  <h1 class="text-3xl font-bold mb-6 text-center">
    🎓 Gerador de Certificados
  </h1>

  <form method="POST" enctype="multipart/form-data" class="space-y-6">

    <div>
      <label class="block font-semibold mb-2">Imagem de Fundo</label>
      <input type="file" name="background" class="w-full border p-2 rounded">
    </div>

    <div>
      <label class="block font-semibold mb-2">Planilha Excel</label>
      <input type="file" name="excel" class="w-full border p-2 rounded">
    </div>

    <div>
      <label class="block font-semibold mb-2">Texto do Certificado</label>
      <textarea name="text" rows="4"
        class="w-full border p-3 rounded"
        placeholder="Certificamos que {{Nome}} concluiu o curso {{Curso}}">
      </textarea>
    </div>

    <div class="grid grid-cols-3 gap-4">
      <input type="number" name="pos_x" value="100" class="border p-2 rounded">
      <input type="number" name="pos_y" value="200" class="border p-2 rounded">
      <input type="number" name="font_size" value="40" class="border p-2 rounded">
    </div>

    <button name="generate"
      class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-semibold">
      Gerar Certificados
    </button>

  </form>
</div>

</body>
</html>
