<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Como funciona - Emitte</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#1f3c88,#4a69bd);
color:white;
text-align:center;
}

.container{
max-width:700px;
margin:auto;
padding:80px 20px;
}

.logo{
width:160px;
margin-bottom:30px;
}

h1{
margin-bottom:40px;
}

.passos{
background:white;
color:#333;
border-radius:12px;
padding:40px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.passos p{
font-size:18px;
margin:18px 0;
}

.btn{
display:inline-block;
margin-top:40px;
padding:15px 40px;
background:white;
color:#1f3c88;
text-decoration:none;
font-weight:bold;
border-radius:8px;
transition:0.3s;
}

.btn:hover{
background:#f1f1f1;
}

footer{
margin-top:80px;
color:#ddd;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<img src="{{ url_for('static', filename='logo.png') }}" class="logo">

<h1>Como funciona</h1>

<div class="passos">

<p>1. Envie o fundo do certificado</p>

<p>2. Envie a planilha Excel com a coluna <b>Nome</b></p>

<p>3. Use <b>{nome}</b> no texto do certificado</p>

<p>4. Gere automaticamente todos os certificados</p>

<a href="/login" class="btn">
Ir para o sistema
</a>

</div>

<footer>

Versão 1.1<br>
Desenvolvido por S3M

</footer>

</div>

</body>
</html>
